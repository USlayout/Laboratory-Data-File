###############################################################################
# benchmark.conf
#
# Configuration file for benchmark_suite.sh
# Edit the values below to match your environment.
# This file is sourced as a bash script, so use standard bash variable syntax.
###############################################################################

# Root directory for local raw data storage
BASE_DIR="${HOME}/benchmark"

# Local path to the GitHub repository (must already be `git clone`d)
GITHUB_REPO_DIR="${HOME}/Laboratory-Data-File"

# iperf3 targets (format: "label:ip_address"), multiple allowed.
# Start `iperf3 -s` (or `iperf3 -s -D`) on each target beforehand.
#
# Example test design:
#   Host OS alone      -> only "external"
#   VM alone            -> both "host" and "external"
#                            (host     = host OS IP; measures virtual network overhead only)
#                            (external = separate PC IP; measures end-to-end incl. physical NIC)
#   Container alone     -> both "host" and "external"
#                            (host     = container host IP; measures bridge/overlay overhead only)
#
# Comment out targets you don't need for a given environment.
IPERF_TARGETS=(
    "host:192.168.1.10"
    "external:192.168.1.100"
)
IPERF_DURATION=30            # seconds

# sysbench settings
SYSBENCH_THREADS=$(nproc)
SYSBENCH_CPU_MAX_PRIME=20000
SYSBENCH_CPU_TIME=60         # seconds
SYSBENCH_MEMORY_TOTAL_SIZE="10G"

# fio settings
FIO_SIZE="1G"
FIO_RUNTIME=30                # seconds

# git settings
GIT_REMOTE="origin"
GIT_BRANCH="main"
